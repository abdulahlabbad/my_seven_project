<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form 1</title>
</head>
<body>
<form action="">
    <h1>Contact Information</h1>
    <fieldset>
        <legend>Personal Information</legend>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email">
        <label for="birthdate">Birthdate:</label>
        <input type="date" id="birthdate" name="birthdate">
        <label for="age">Age:</label>
        <input type="number" id="age" name="age">
    </fieldset>
    <fieldset>
        <legend>Preferences</legend>
        <p>Subscription Type:</p>
        <label for="basic">Basic</label>
        <input type="radio" id="basic" name="subscription" value="Basic" checked>
        <label for="premium">Premium</label>
        <input type="radio" id="premium" name="subscription" value="Premium">

        <p>Newsletter:</p>
        <label for="news">Subscribe to newsletter? </label>
        <input type="checkbox" id="news" name="news" checked>
        <label for="country">Country:</label>
        <select name="country" id="country">
            <option value="usa">United States</option>
            <option value="can" selected>Canda</option>
            <option value="un">United Kingdom</option>
        </select>
    </fieldset>

    <fieldset>
        <legend>Your Message</legend>
        <label for="message">Message:</label>
        <textarea name="message" id="message" rows="4"></textarea>
    </fieldset>
    <br>
    <input type="submit" value="send">
</form>
</body>
</html>
